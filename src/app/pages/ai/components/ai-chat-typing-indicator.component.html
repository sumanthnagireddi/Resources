<div class="flex gap-3">
  <div class="mt-0.5 shrink-0">
    <div *ngIf="!spinnerVerb"
      class="flex h-7 w-7 items-center justify-center rounded-lg border border-[#c97b4b]/15 bg-[#c97b4b]/8 dark:border-[#e07b4b]/20 dark:bg-[#e07b4b]/10"
    >
      <svg
        width="12"
        height="12"
        viewBox="0 0 22 22"
        fill="none"
        class="text-[#c97b4b] dark:text-[#e07b4b]"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <circle cx="11" cy="11" r="9" opacity="0.4"></circle>
        <circle cx="11" cy="11" r="3" fill="currentColor" opacity="0.7" stroke="none"></circle>
      </svg>
    </div>
    <div *ngIf="spinnerVerb"
      class="flex h-7 w-7 items-center justify-center rounded-lg border border-[#c97b4b]/15 bg-[#c97b4b]/8 dark:border-[#e07b4b]/20 dark:bg-[#e07b4b]/10"
    >
      <svg
        class="h-4 w-4 animate-spin"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#c97b4b"
        stroke-width="2"
      >
        <path d="M21 12a9 9 0 1 1-6.219-8.56" stroke-linecap="round"></path>
      </svg>
    </div>
  </div>

  <div
    class="flex items-center gap-3"
  >


    <span class="text-sm font-medium text-slate-600 dark:text-slate-300">
      {{ spinnerVerb() || 'Thinking' }}
    </span>

    <div class="flex items-center gap-1.5">
      <span class="h-1.5 w-1.5 animate-bounce rounded-full bg-[#c97b4b]/60 dark:bg-[#e07b4b]/60"></span>
      <span
        class="h-1.5 w-1.5 animate-bounce rounded-full bg-[#c97b4b]/60 [animation-delay:160ms] dark:bg-[#e07b4b]/60"
      ></span>
      <span
        class="h-1.5 w-1.5 animate-bounce rounded-full bg-[#c97b4b]/60 [animation-delay:320ms] dark:bg-[#e07b4b]/60"
      ></span>
    </div>
  </div>
</div>
