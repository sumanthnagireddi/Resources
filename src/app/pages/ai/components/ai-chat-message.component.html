<div class="flex gap-3" [class.justify-end]="message().role === 'user'">
  <div *ngIf="message().role === 'assistant'" class="mt-0.5 shrink-0">
    <div
      class="flex h-7 w-7 items-center justify-center rounded-lg border border-[#c97b4b]/15 bg-[#c97b4b]/8 dark:border-[#e07b4b]/20 dark:bg-[#e07b4b]/10"
    >
      <svg
        width="12"
        height="12"
        viewBox="0 0 22 22"
        fill="none"
        class="text-[#c97b4b] dark:text-[#e07b4b]"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <circle cx="11" cy="11" r="9" opacity="0.4"></circle>
        <circle cx="11" cy="11" r="3" fill="currentColor" opacity="0.7" stroke="none"></circle>
      </svg>
    </div>
  </div>

  <div
    *ngIf="message().role === 'assistant'; else userMessage"
    class="prose prose-sm max-w-2xl min-w-0 text-[#1a1a1a] dark:text-white/85"
    [innerHTML]="renderContent(message().content)"
  ></div>

  <ng-template #userMessage>
    <div
      class="max-w-xs rounded-2xl rounded-tr-md border border-black/[0.07] bg-white px-4 py-2.5 text-[14px] leading-relaxed text-[#1a1a1a] shadow-sm md:max-w-md dark:border-white/[0.09] dark:bg-white/[0.07] dark:text-white/90"
    >
      {{ message().content }}
    </div>
  </ng-template>
</div>
