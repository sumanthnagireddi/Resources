<div class="flex h-full min-h-0 bg-[#fafaf9] font-sans transition-colors duration-300 dark:bg-slate-950">
  <div class="relative flex min-w-0 flex-1 flex-col">
    <div #messageContainer class="flex-1 overflow-y-auto">
      <app-ai-chat-empty-state
        *ngIf="!store.hasActiveConversation(); else conversationThread"
        [suggestions]="store.suggestions"
        (suggestionSelected)="useSuggestion($event)"
      ></app-ai-chat-empty-state>

      <ng-template #conversationThread>
        <app-ai-chat-thread
          [messages]="store.currentMessages()"
          [isGenerating]="store.isGenerating()"
          [spinnerVerb]="store.spinnerVerb()"
        ></app-ai-chat-thread>
      </ng-template>
    </div>

    <app-ai-chat-composer
      [text]="store.draft()"
      [isGenerating]="store.isGenerating()"
      (textChange)="updateDraft($event)"
      (sendMessage)="sendMessage()"
    ></app-ai-chat-composer>
  </div>
</div>
